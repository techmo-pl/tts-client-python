[mypy]
exclude = setup\.py

# grpc stubs are incomplete
[mypy-grpc.*]
ignore_missing_imports = True

# sounddevice has no stubs
[mypy-sounddevice.*]
ignore_missing_imports = True

# lxml has no PEP 561 stubs package
[mypy-lxml.*]
ignore_missing_imports = True

# numpy stubs ship with numpy>=1.20; suppress for environments lacking numpy
[mypy-numpy.*]
ignore_missing_imports = True

# Relax strict checking for test code
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_any_generics = False
disallow_untyped_decorators = False
