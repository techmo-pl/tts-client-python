[tox]
# Python 3.7 is not downloadable via uv; minimum testable version is 3.8.
# Python 3.14 is included as a release candidate to catch forward-compat issues.
envlist = py38, py39, py310, py311, py312, py313, py314
requires =
    tox-uv>=1

[testenv]
# skip_install=true keeps each env lightweight: the package is found via PYTHONPATH
# rather than doing a full editable install in each env.
# Proto stubs (tts_client_python/proto/*_pb2.py) are NOT committed — they are
# gitignored and must be generated before tests run.  In CI the "Generate proto
# stubs" step does this; locally, run `./install.sh` first (triggers proto
# generation via the setup.py cmdclass hooks; requires the tts-service-api
# submodule — see README § Running tests).
skip_install = true
set_env = PYTHONPATH = {toxinidir}
# Pass service-address variables so integration tests can connect to a live service
# when run via tox (e.g. tox -e py312 -- -m integration).
passenv =
    TTS_*
deps =
    # grpcio 1.71.0 dropped Python 3.8; stubs require grpcio>=1.70.0.
    grpcio>=1.70.0,<2.0.0; python_version>="3.9"
    grpcio>=1.70.0,<1.71.0; python_version=="3.8"
    protobuf>=5.29.0,<6.0.0; python_version=="3.8"
    protobuf>=5.29.0; python_version>="3.9"
    lxml>=4.6.4
    numpy>=1.19.5
    sounddevice>=0.4.0
    pytest>=7.0
    pytest-cov>=4.0
    jiwer>=3.0
commands_pre =
    # Abort early with a clear message if proto stubs are missing rather than
    # letting pytest fail with a cryptic ModuleNotFoundError deep in imports.
    # PYTHONPATH already contains {toxinidir} so we use it to locate the stub.
    python -c "import os, sys; stub = os.path.join(os.environ['PYTHONPATH'], 'tts_client_python', 'proto', 'techmo_tts_pb2.py'); sys.exit(0) if os.path.exists(stub) else sys.exit('Proto stubs missing. Run: ./install.sh  (or: python setup.py build_grpc)')"
commands =
    pytest --basetemp={envtmpdir} --cov=tts_client_python --cov-report=term-missing --cov-report=xml:{envtmpdir}/coverage.xml {posargs}
