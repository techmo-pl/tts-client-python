[tox]
# Python 3.7 is not downloadable via uv; minimum testable version is 3.8.
# Python 3.14 is included as a release candidate to catch forward-compat issues.
envlist = py38, py39, py310, py311, py312, py313, py314
requires =
    tox-uv>=1

[testenv]
extras = test
# Pass service-address variables so integration tests can connect to a live service
# when run via tox (e.g. tox -e py312 -- -m integration).
passenv =
    TTS_*
commands =
    pytest --basetemp={envtmpdir} --cov=tts_client_python --cov-report=term-missing --cov-report=xml:{envtmpdir}/coverage.xml {posargs}
